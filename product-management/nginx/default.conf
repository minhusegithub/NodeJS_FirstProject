# ==============================================
# Nginx Configuration — mvnstore.xyz
# ==============================================
# VPS: 45.32.123.151 (Vultr Singapore)
# DNS: Cloudflare Proxy (Orange Cloud)
# SSL: Cloudflare Edge → Cloudflare Origin Cert → Nginx
#
# Cloudflare SSL mode: Full (Strict)
# Origin cert path: /etc/ssl/cloudflare/

# --- Rate Limiting ---
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# --- Redirect HTTP → HTTPS ---
server {
    listen 80;
    server_name mvnstore.xyz www.mvnstore.xyz api.mvnstore.xyz;
    return 301 https://$host$request_uri;
}

# --- Backend API: api.mvnstore.xyz ---
server {
    listen 443 ssl http2;
    server_name api.mvnstore.xyz;

    # Cloudflare Origin Certificate
    ssl_certificate     /etc/ssl/cloudflare/mvnstore.xyz.pem;
    ssl_certificate_key /etc/ssl/cloudflare/mvnstore.xyz.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Only allow Cloudflare IPs (optional but recommended)
    # https://www.cloudflare.com/ips/
    # set_real_ip_from 173.245.48.0/20;
    # set_real_ip_from 103.21.244.0/22;
    # ... (add all Cloudflare IP ranges)
    # real_ip_header CF-Connecting-IP;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Socket.IO)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Rate limiting
        limit_req zone=api_limit burst=50 nodelay;
    }
}

# --- Frontend SPA: mvnstore.xyz ---
server {
    listen 443 ssl http2;
    server_name mvnstore.xyz www.mvnstore.xyz;

    # Cloudflare Origin Certificate
    ssl_certificate     /etc/ssl/cloudflare/mvnstore.xyz.pem;
    ssl_certificate_key /etc/ssl/cloudflare/mvnstore.xyz.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /opt/NodeJS_FirstProject/product-management/frontend/dist;
    index index.html;

    # SPA fallback — all routes → index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (JS, CSS, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
}
